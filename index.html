<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="sprites/icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <script src="main.js" defer></script>
    <title>Torre de Hanoi</title>
</head>
<body>
    <div id="replay-overlay"></div>
    <img src="sprites/material-symbols--history.svg" alt="History" id="history-button">
    <a href="/start.html" id="home-button"><img src="sprites/material-symbols--home-rounded.svg" alt="Home"></a>
    <div class="hidden" id="history-sidebar">
        <div class="history-header">
            <img src="sprites/mdi--trash.svg" alt="reset-history-button" id="reset-history-button">
            <button id="replay-history-button">replay</button>
        </div>
        <hr id="first-history-separator">
    </div>
    <div id="move-counter">
        <img src="sprites/counter-sign.png" alt="counter-wooden-sign">
        <span class="text">movimentos/min: <br>
            <span id="move-count-number">0</span>/
            <span id="min-moves-counter"></span>
        </span>
    </div>
    <div id="main-container">
        <div class="island">
            <div class="tower drop-zone" id="tower-1"></div>
            <span class="island-sprite"></span>
        </div>
        
        <div class="island">
            <div class="tower drop-zone" id="tower-2"></div>
            <span class="island-sprite"></span>
        </div>

        <div class="island">
            <div class="tower drop-zone" id="tower-3"></div>
            <span class="island-sprite"></span>
        </div>
    </div>
</body>
</html>
